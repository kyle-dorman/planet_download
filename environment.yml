name: planet_download
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Python
  - python>=3.12,<3.13

  # Build/install tools
  - pip>=25.0
  - setuptools>=75.0
  - wheel>=0.44

  # Base
  - pyyaml>=6.0
  - tqdm>=4.66
  - click>=8.1
  - python-dotenv
  - omegaconf>=2.3
  - numpy>=2.0
  - pandas>=3.0

  # Geo
  - rasterio>=1.4
  - shapely>=2.0
  - xarray>=2024.10
  - folium>=0.19
  - gdal>=3.9
  - planet
  - geopandas>=1.1.3
  - pyogrio>=0.10
  - fiona>=1.10

  # Plotting
  - seaborn>=0.13
  - matplotlib>=3.9

  # Notebooks
  - ipython>=8.0
  - notebook>=7.0
  - ipywidgets>=8.0

  # Linting
  - black>=25.0
  - isort>=5.13
  - pyupgrade>=3.19
  - pygments>=2.18
  - flake8>=7.1

  - pip:
      - -e .
